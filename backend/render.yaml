services:
  - type: web
    name: vendora-backend
    runtime: docker
    rootDir: .
    plan: free
    autoDeploy: true
    healthCheckPath: /api/auth/status
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_SETUP_ENABLED
        value: "true"
      - key: AUTH_PUBLIC_SIGNUP_ENABLED
        value: "true"
