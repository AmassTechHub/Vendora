spring.application.name=vendora-backend
server.port=${PORT:10000}

# Default: local SQLite. Production: SPRING_PROFILES_ACTIVE=prod + DATABASE_* (Supabase Postgres).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:posSystemSecretKey2024SuperSecureKeyForJWTTokenGeneration}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

auth.setup.enabled=${AUTH_SETUP_ENABLED:false}
auth.public-signup-enabled=${AUTH_PUBLIC_SIGNUP_ENABLED:true}
auth.refresh-token-expiration=${AUTH_REFRESH_TOKEN_EXPIRATION:1209600000}
auth.max-login-attempts=${AUTH_MAX_LOGIN_ATTEMPTS:5}
auth.lock-minutes=${AUTH_LOCK_MINUTES:15}

# Paystack
paystack.secret-key=${PAYSTACK_SECRET_KEY:}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:}
