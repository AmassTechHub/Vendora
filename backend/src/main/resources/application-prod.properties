# ── Database (Supabase pooler) ──────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.jakarta.persistence.jdbc.url=${DATABASE_URL}
spring.jpa.properties.jakarta.persistence.jdbc.user=${DATABASE_USERNAME}
spring.jpa.properties.jakarta.persistence.jdbc.password=${DATABASE_PASSWORD}

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:vendora-fallback-secret-change-this-in-render-env-vars}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://vendora-afrik.vercel.app}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}

# ── Auth ─────────────────────────────────────────────────────────────────────
auth.setup.enabled=false
auth.public-signup-enabled=${AUTH_PUBLIC_SIGNUP_ENABLED:true}
auth.refresh-token-expiration=${AUTH_REFRESH_TOKEN_EXPIRATION:1209600000}
auth.max-login-attempts=${AUTH_MAX_LOGIN_ATTEMPTS:5}
auth.lock-minutes=${AUTH_LOCK_MINUTES:15}

# ── Paystack (optional — app starts without it) ───────────────────────────────
paystack.secret-key=${PAYSTACK_SECRET_KEY:}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:}
